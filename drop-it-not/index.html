<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drop It Not</title>
  <meta
    name="description"
    content="Drop It Not — mobile-first игра на canvas с переключением шара между двумя стенами."
  />
  <meta name="theme-color" content="#ffe066" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <main class="app-shell" data-screen="menu">
    <section class="screen screen--menu" aria-labelledby="menu-title">
      <div class="menu-backdrop" aria-hidden="true"></div>
      <div class="menu-panel">
        <h1 class="menu-title" id="menu-title">Drop It Not</h1>
        <p class="menu-copy">Переключай шар между стенами и держись как можно дольше.</p>
        <div class="stats" aria-label="Игровая статистика">
          <article class="stat-card">
            <span class="stat-label">Лучшее время</span>
            <strong class="stat-value" id="recordValue">0.0с</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Комбо</span>
            <strong class="stat-value" id="comboValue">—</strong>
          </article>
        </div>
        <button class="start-button" id="startButton" type="button">Начать</button>
      </div>
    </section>

    <section class="screen screen--game" aria-label="Игровой экран">
      <div class="game-hud" aria-hidden="true">
        <div class="score-readout" id="comboHud">Комбо —</div>
        <div class="score-readout" id="scoreHud">Время 0.0с</div>
      </div>
      <canvas id="gameCanvas" aria-label="Игровое поле"></canvas>
    </section>
  </main>

  <script type="module" src="./index.js"></script>
</body>
</html>
