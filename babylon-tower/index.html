<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentagonal Prism Slider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f6f2ea;
        }

        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #hud {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        #info {
            background: rgba(255, 250, 242, 0.9);
            color: #4b4a47;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(190, 180, 170, 0.6);
            box-shadow: 0 4px 16px rgba(120, 110, 100, 0.14);
        }

        #info.solved {
            background: rgba(90, 138, 112, 0.88);
            border-color: rgba(90, 138, 112, 0.5);
            color: #fff;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .btn {
            background: #f1e7db;
            color: #4b4a47;
            border: 1px solid #cfc3b6;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: #e4dcd0;
            border-color: #bbaea2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(120, 110, 100, 0.18);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.action-btn {
            background: #ede3d8;
        }

        .btn.action-btn:hover {
            background: rgba(168, 88, 88, 0.88);
            border-color: rgba(168, 88, 88, 0.5);
            color: #fff;
        }

        .btn.scramble-btn:hover {
            background: rgba(184, 128, 64, 0.88);
            border-color: rgba(184, 128, 64, 0.5);
            color: #fff;
        }

        .btn.reset-btn:hover {
            background: rgba(90, 138, 112, 0.88);
            border-color: rgba(90, 138, 112, 0.5);
            color: #fff;
        }

        #last-move {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 250, 242, 0.88);
            color: #9a9088;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(190, 180, 170, 0.5);
            backdrop-filter: blur(8px);
        }

        #instructions {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 250, 242, 0.88);
            color: #6a6259;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
            border: 1px solid rgba(190, 180, 170, 0.5);
            backdrop-filter: blur(8px);
            max-width: 240px;
            box-shadow: 0 4px 16px rgba(120, 110, 100, 0.14);
        }

        #instructions strong {
            color: #4b4a47;
        }
    </style>
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=107098559', 'ym');

        ym(107098559, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/107098559" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    <!-- /Yandex.Metrika counter -->
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <div id="last-move">Last: -</div>
    
    <div id="instructions">
        <strong>Controls:</strong><br>
        🖱️ Drag to rotate view<br>
        🔍 Scroll to zoom<br>
        👆 Click chip → click target to slide<br>
        🔵 Top buttons: rotate CW<br>
        🔴 Bottom buttons: rotate CCW<br>
        ⎋ Esc to deselect
    </div>
    
    <div id="hud">
        <div id="info">Moves: 0 | Not Solved</div>
        <div class="button-row">
            <button class="btn action-btn reset-btn" id="reset-btn">Reset</button>
            <button class="btn action-btn scramble-btn" id="scramble-btn">Scramble</button>
            <button class="btn action-btn" id="undo-btn">Undo</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="logic.js"></script>
    <script type="module" src="render.js"></script>
    <script type="module" src="input.js"></script>
</body>
</html>
