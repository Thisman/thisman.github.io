<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon Tower</title>
    <meta name="theme-color" content="#f5f5f5" />
    <script src="/shared/theme.js"></script>
    <script src="/shared/browser/analytics.js"></script>
    <link rel="stylesheet" href="/shared/common.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            padding-bottom: 0;
            background: var(--page-bg);
            color: var(--text-primary);
            font-family: var(--font-primary);
        }

        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .topbar {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 110;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: calc(100vw - 36px);
        }

        #last-move,
        #instructions,
        #info {
            border: 1px solid var(--border);
            background: var(--floating-surface);
        }

        #last-move {
            position: fixed;
            top: 72px;
            left: 18px;
            z-index: 100;
            min-height: 40px;
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: var(--caption);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #instructions {
            position: fixed;
            top: 72px;
            right: 18px;
            z-index: 100;
            max-width: 280px;
            padding: 14px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            font-size: var(--body-sm);
            line-height: 1.65;
        }

        #instructions strong {
            display: block;
            margin-bottom: 6px;
            color: var(--text-display);
            font-family: var(--font-mono);
            font-size: var(--caption);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #hud {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: min(100vw - 36px, 520px);
        }

        #info {
            width: 100%;
            min-height: 48px;
            padding: 12px 18px;
            border-radius: 999px;
            color: var(--text-display);
            font-family: var(--font-mono);
            font-size: var(--caption);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
        }

        #info.solved {
            border-color: var(--success);
            color: var(--success);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .btn.action-btn {
            background: transparent;
            color: var(--text-primary);
            border-color: var(--border-visible);
        }

        .btn.action-btn:hover {
            background: var(--surface-raised);
            border-color: var(--text-display);
        }

        .btn.scramble-btn:hover {
            border-color: var(--warning);
            color: var(--warning);
        }

        .btn.reset-btn:hover {
            border-color: var(--success);
            color: var(--success);
        }

        @media (max-width: 760px) {
            #instructions {
                top: 72px;
                max-width: 220px;
                font-size: 0.75rem;
            }

            #last-move {
                top: 128px;
            }
        }
    </style>

</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div class="topbar">
        <a class="nav-chip" href="/index.html">Back</a>
        <a class="nav-chip" href="https://github.com/Thisman/thisman.github.io" target="_blank" rel="noreferrer">Repository</a>
    </div>

    <div id="last-move">Last move —</div>

    <div id="instructions">
        <strong>Controls</strong>
        Drag to rotate the view.<br>
        Scroll to zoom.<br>
        Click a chip, then a target cell, to slide.<br>
        Arrow buttons around the prism rotate layers.<br>
        Press <kbd>Esc</kbd> to clear selection.
    </div>

    <div id="hud">
        <div id="info">Moves: 0 / Not solved</div>
        <div class="button-row">
            <button class="btn action-btn reset-btn" id="reset-btn" type="button">Reset</button>
            <button class="btn action-btn scramble-btn" id="scramble-btn" type="button">Scramble</button>
            <button class="btn action-btn" id="undo-btn" type="button">Undo</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
