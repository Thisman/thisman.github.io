<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Valentine — арканоид</title>
    <meta name="theme-color" content="#f5f5f5" />
    <script src="/shared/theme.js"></script>
    <script src="/shared/browser/analytics.js"></script>
    <link rel="stylesheet" href="/shared/common.css" />
    <link rel="stylesheet" href="./index.css" />
</head>
<body>
    <main class="main-container valentine-page">
        <header class="page-header">
            <div class="nav-row">
                <a class="nav-chip" href="/index.html">Back</a>
                <span class="nav-chip">Arcade</span>
            </div>
            <div class="page-kicker">Brick Heart</div>
            <h1 class="page-title">MY VALENTINE</h1>
            <p class="page-summary">
                Лёгкий арканоид: разбей все блоки в форме сердца и открой финальную валентинку.
                Управление — стрелки или <strong>A / D</strong>, запуск шара — <strong>пробел</strong>.
            </p>
        </header>

        <section class="game-shell">
            <div class="game-stage">
                <div class="hud">Lives <span id="livesCount">3</span></div>
                <div id="valentineMessage" class="message" aria-hidden="true">Будь моей валентинкой</div>
                <img
                    id="winImage"
                    class="win-image"
                    src="./heart.jpg"
                    alt="Валентинка"
                    aria-hidden="true"
                />
                <canvas id="gameCanvas" width="900" height="760" aria-label="Поле арканоида"></canvas>
            </div>

            <div class="controls">
                <button id="restartBtn" type="button" class="btn ghost">Перезапуск</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <a href="/index.html">Home</a>
        <a href="https://github.com/Thisman/thisman.github.io" target="_blank" rel="noreferrer">Repository</a>
    </footer>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
